name: Build & Push Docker Image

# Triggers when anything that affects the inference container changes.
# Training the notebook is NOT run here — that stays a local step.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements-inference.txt
      - utils/inference_api.py
      - utils/data_loader.py
      - utils/feature_engineering.py
      - utils/ml_classification.py
      - utils/plot_style.py
  # Allow manual re-trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: turbofan-health-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no manual secret needed

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag with full git SHA for traceability
            type=sha,prefix=sha-
            # tag latest only on pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — faster than rebuilding layers from scratch every run
          cache-from: type=gha
          cache-to:   type=gha,mode=max
